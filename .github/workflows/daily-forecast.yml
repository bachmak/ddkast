name: Daily forecast

on:
  schedule:
    # 19:00 UTC daily (21:00 Europe/Berlin during CET, 20:00 during CEST) —
    # safely before the D-1 23:59 CET leaderboard submission deadline.
    # Forecast horizon (48h) and TEST_DAYS=0 are set in env below so predict
    # produces a forward-looking forecast that covers tomorrow 00:00–23:00 UTC.
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    env:
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
      TEST_DAYS: "0"
      HORIZON: "48"
      TEAM_ID: ${{ vars.TEAM_ID }}
      LEADERBOARD_FORK: ${{ vars.LEADERBOARD_FORK }}
      LEADERBOARD_UPSTREAM: bartzbeielstein/challenge-leaderboard
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync

      - name: Checkout leaderboard fork
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}
        run: |
          gh repo clone "$LEADERBOARD_FORK" challenge-leaderboard -- --depth=1
          cd challenge-leaderboard
          git remote add upstream "https://github.com/$LEADERBOARD_UPSTREAM.git"
          git fetch upstream main --depth=1
          git checkout -B main upstream/main
          git config user.name "${TEAM_ID}-bot"
          git config user.email "${TEAM_ID}-bot@users.noreply.github.com"

      - name: Download
        run: uv run ddkast download

      - name: Merge
        run: uv run ddkast merge

      - name: Train
        run: uv run ddkast train

      - name: Predict
        run: uv run ddkast predict

      - name: Format submission (write CSV into fork)
        run: |
          uv run ddkast format-submission \
            --out-dir "challenge-leaderboard/submissions/${TEAM_ID}"

      - name: Compute target date
        id: target
        run: echo "date=$(date -u -d 'tomorrow' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Validate submission (leaderboard's own validator)
        working-directory: challenge-leaderboard
        run: |
          if [ -f scripts/validate_submission.py ]; then
            uv run --no-project python scripts/validate_submission.py \
              --path "submissions/${TEAM_ID}/${{ steps.target.outputs.date }}.csv" \
              --skip-deadline
          else
            echo "No upstream validator found; skipping."
          fi

      - name: Commit, push, and open PR
        working-directory: challenge-leaderboard
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}
          TARGET: ${{ steps.target.outputs.date }}
        run: |
          BRANCH="submission/${TEAM_ID}-${TARGET}"
          git switch -c "$BRANCH"
          git add "submissions/${TEAM_ID}/${TARGET}.csv"
          git commit -m "${TEAM_ID}: submission for ${TARGET}"
          git push --force -u origin "$BRANCH"
          gh pr create \
            --repo "$LEADERBOARD_UPSTREAM" \
            --base main \
            --head "$(gh repo view "$LEADERBOARD_FORK" --json owner --jq '.owner.login'):${BRANCH}" \
            --title "${TEAM_ID}: submission for ${TARGET}" \
            --body "Automated submission from ${TEAM_ID} for ${TARGET} (UTC)."
