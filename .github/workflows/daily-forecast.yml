name: Daily forecast

on:
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    env:
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
      TEST_DAYS: "0"
      HORIZON: "48" # to surely cover the whole next day
      TEAM_ID: ${{ vars.TEAM_ID }}
      LEADERBOARD_FORK: ${{ vars.LEADERBOARD_FORK }}
      LEADERBOARD_UPSTREAM: bartzbeielstein/challenge-leaderboard
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync

      - name: Check out leaderboard fork
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}
        run: |
          # Wire git's credential helper to gh so the later `git push` to the
          # fork authenticates with GH_TOKEN (a plain https remote URL carries
          # no embedded token).
          gh auth setup-git
          # Deliberately do NOT sync the fork from upstream. Upstream's main
          # carries workflow files (.github/workflows/*) the fork lacks, and
          # GitHub refuses to land those — whether via `git push` or the
          # fork-sync `merge-upstream` API — unless LEADERBOARD_PAT holds the
          # `workflow` scope, which we keep off it (least privilege). We instead
          # branch the submission off the fork's OWN main, so the push carries
          # only our CSV commit. The PR is opened against upstream; GitHub does
          # that merge server-side, where our token's scope is irrelevant.
          FORK=$(gh repo view "$LEADERBOARD_FORK" --json nameWithOwner --jq '.nameWithOwner')
          git clone --depth=1 "https://github.com/$FORK.git" challenge-leaderboard
          cd challenge-leaderboard
          git config user.name "${TEAM_ID}-bot"
          git config user.email "${TEAM_ID}-bot@users.noreply.github.com"

      - name: Set dynamic download_end (today UTC)
        # download.py adds one day, so end = tomorrow 00:00 → fetches all of
        # today's available actuals (matches the lecture's END_DOWNLOAD = TODAY_UTC).
        run: echo "DOWNLOAD_END=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Download
        run: uv run ddkast download

      - name: Merge
        run: uv run ddkast merge

      - name: Assert data is fresh
        run: |
          uv run python -c "
          import pandas as pd, sys
          from ddkast.config import load
          from ddkast.data.store import ParquetStore
          c = load()
          ts = ParquetStore(c.processed_dir).read(c.processed_load).index.max()
          need = pd.Timestamp.now(tz='UTC').normalize() - pd.Timedelta(hours=1)
          sys.exit(0 if ts >= need else f'stale: last actual {ts} < {need}')
          "

      - name: Pin forecast origin to last actual (single operational fold)
        # config.py's defaults span a year of rolling origins — right for `evaluate`,
        # wrong here: the daily submission needs exactly ONE fold whose block covers
        # tomorrow. This is deployment context, so it lives in the action (env), not
        # config.toml. The fold's origin must equal the last training timestamp: the
        # recursive forecaster continues from there, so forecast_start = origin + 1h.
        # Pinning the origin to the freshest actual makes forecast_start land at most
        # one hour past it, and HORIZON=48 carries the block past tomorrow 23:00 — so
        # the single fold covers the whole submission day. n_forecasts=1 ⇒ one fold;
        # train fits one model on all data ≤ origin.
        run: |
          ORIGIN=$(uv run python -c "
          from ddkast.config import load
          from ddkast.data.store import ParquetStore
          c = load()
          ts = ParquetStore(c.processed_dir).read(c.processed_load).index.max()
          print(ts.tz_convert('UTC').strftime('%Y-%m-%dT%H:%M:%SZ'))
          ")
          {
            echo "N_FORECASTS=1"
            echo "FORECASTS_START=$ORIGIN"
            echo "FORECASTS_END=$ORIGIN"
          } >> "$GITHUB_ENV"

      - name: Train
        run: uv run ddkast train

      - name: Predict
        run: uv run ddkast predict

      - name: Format submission (write CSV into fork)
        run: |
          uv run ddkast format-submission \
            --out-dir "challenge-leaderboard/submissions/${TEAM_ID}"

      - name: Compute target date
        id: target
        run: echo "date=$(date -u -d 'tomorrow' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Validate submission (leaderboard's own validator)
        working-directory: challenge-leaderboard
        run: |
          if [ -f scripts/validate_submission.py ]; then
            uv run --no-project python scripts/validate_submission.py \
              --path "submissions/${TEAM_ID}/${{ steps.target.outputs.date }}.csv" \
              --skip-deadline
          else
            echo "No upstream validator found; skipping."
          fi

      - name: Commit, push, and open PR
        working-directory: challenge-leaderboard
        # Upstream CI runs validate_authorship() against the PR author, so
        # LEADERBOARD_PAT's owner must be a registered handle
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PAT }}
          TARGET: ${{ steps.target.outputs.date }}
        run: |
          BRANCH="submission/${TEAM_ID}-${TARGET}"
          git switch -c "$BRANCH"
          git add "submissions/${TEAM_ID}/${TARGET}.csv"
          git commit -m "${TEAM_ID}: submission for ${TARGET}"
          git push --force -u origin "$BRANCH"
          gh pr create \
            --repo "$LEADERBOARD_UPSTREAM" \
            --base main \
            --head "$(gh repo view "$LEADERBOARD_FORK" --json owner --jq '.owner.login'):${BRANCH}" \
            --title "${TEAM_ID}: submission for ${TARGET}" \
            --body "Automated submission from ${TEAM_ID} for ${TARGET} (UTC)."
